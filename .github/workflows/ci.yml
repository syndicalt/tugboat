name: tugboat-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tugboat-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proposal-only-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev]"
      - run: tugboat doctor
      - run: tugboat ci --repo .
      - run: tugboat index --repo . --check
      - run: tugboat harness check --repo .
      - run: python -m pytest tests/test_packaging_smoke.py -q
      - run: python -m pytest --cov=src --cov-report=term-missing -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tugboat-ci-artifacts
          retention-days: 14
          path: |
            .sidecar/ci/ci-report.json
            .sidecar/ci/**
            .sidecar/runs/**
