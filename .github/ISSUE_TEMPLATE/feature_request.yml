name: Feature Request
description: Propose a Tugboat improvement aligned with the v1.0 roadmap.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: outcome
    attributes:
      label: User-visible outcome
      description: What should a Tugboat user be able to do after this ships?
    validations:
      required: true
  - type: textarea
    id: surface
    attributes:
      label: Affected commands or artifacts
      description: List CLI commands, MCP tools, daemon behavior, docs, or artifact schemas likely affected.
      placeholder: tugboat audit, candidate.json, report.md
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and rollback considerations
      description: Explain authority boundaries, policy gates, rollback behavior, and how this avoids silent mutation.
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Tests required
      description: List the focused tests, integration tests, docs contracts, or release gates that would prove this feature.
      placeholder: tests/test_*.py, tugboat harness check --repo .
    validations:
      required: true
  - type: textarea
    id: docs
    attributes:
      label: Docs required
      description: List docs, examples, CLI help, or release notes that must change with this feature.
      placeholder: docs/cli-reference.md, docs/troubleshooting.md
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define the observable behavior and evidence required before this can close.
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should remain explicitly out of scope?
  - type: input
    id: roadmap
    attributes:
      label: v1.0 roadmap link
      description: Reference the relevant section of docs/roadmaps/v1.0.0-roadmap.md.
      placeholder: docs/roadmaps/v1.0.0-roadmap.md#v1-feature-tracks
