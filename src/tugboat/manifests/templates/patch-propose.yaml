name: patch-propose
purpose: Propose bounded instruction edits from audited evidence and drift clusters.
inputs:
  - instruction_index
  - instruction_index_artifact
  - drift_clusters
  - optimizer_notes
  - optimizer_memory
  - optimization_batch
  - reflection_artifact
  - policy
outputs:
  - candidate_patch
  - proposal_rationale
output_artifacts:
  candidate_patch: candidate.raw.json
  proposal_rationale: proposal-rationale.raw.json
