name: tugboat

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tugboat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e .
      - run: tugboat doctor
      - run: tugboat index --repo . --check
      - run: tugboat harness check --repo .
      - run: python -m pytest --cov -q
